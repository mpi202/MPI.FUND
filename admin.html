<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — mpi.fund Document Manager</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
<!-- Firebase SDK (compat for simplicity) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
</head>
<body class="bg-neutral-950 text-white font-sans min-h-screen">

<!-- LOGIN SCREEN -->
<div id="login-screen" class="min-h-screen flex items-center justify-center px-6">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <p class="text-2xl font-bold">mpi.fund</p>
      <p class="text-sm text-neutral-500 mt-1">Document Admin</p>
    </div>
    <form onsubmit="doLogin(event)" class="space-y-4">
      <input id="login-email" type="email" required placeholder="Email" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm placeholder-neutral-500 focus:outline-none focus:border-emerald-500 transition-colors"/>
      <input id="login-pass" type="password" required placeholder="Password" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm placeholder-neutral-500 focus:outline-none focus:border-emerald-500 transition-colors"/>
      <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-3 rounded-lg transition-colors text-sm">Sign in</button>
      <p id="login-error" class="text-red-400 text-xs text-center hidden"></p>
    </form>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin-dashboard" class="hidden">
  <!-- Top bar -->
  <header class="border-b border-white/10 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <p class="font-bold text-lg">mpi.fund</p>
      <span class="text-xs bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded-full font-medium">Admin</span>
    </div>
    <div class="flex items-center gap-4">
      <span id="admin-email" class="text-xs text-neutral-500"></span>
      <button onclick="doLogout()" class="text-xs text-neutral-400 hover:text-white transition-colors">Sign out</button>
    </div>
  </header>

  <div class="flex">
    <!-- Sidebar -->
    <nav class="w-56 border-r border-white/10 min-h-[calc(100vh-57px)] p-4 space-y-1">
      <button onclick="selectCat('asset-manager')" class="cat-btn w-full text-left px-3 py-2.5 rounded-lg text-sm transition-colors text-neutral-400 hover:text-white hover:bg-white/5" data-cat="asset-manager">Az Alapkezelő dokumentumai</button>
      <button onclick="selectCat('regulatory')" class="cat-btn w-full text-left px-3 py-2.5 rounded-lg text-sm transition-colors text-neutral-400 hover:text-white hover:bg-white/5" data-cat="regulatory">Szabályozói kiadványok</button>
      <button onclick="selectCat('customer-info')" class="cat-btn w-full text-left px-3 py-2.5 rounded-lg text-sm transition-colors text-neutral-400 hover:text-white hover:bg-white/5" data-cat="customer-info">Ügyfél-tájékoztatás</button>
      <button onclick="selectCat('fatca')" class="cat-btn w-full text-left px-3 py-2.5 rounded-lg text-sm transition-colors text-neutral-400 hover:text-white hover:bg-white/5" data-cat="fatca">FATCA</button>
      <button onclick="selectCat('crs')" class="cat-btn w-full text-left px-3 py-2.5 rounded-lg text-sm transition-colors text-neutral-400 hover:text-white hover:bg-white/5" data-cat="crs">CRS</button>
    </nav>

    <!-- Main content -->
    <main class="flex-1 p-8">
      <div class="flex items-center justify-between mb-6">
        <h2 id="cat-title" class="text-xl font-bold">Select a category</h2>
        <button id="add-btn" onclick="openAddModal()" class="hidden items-center gap-2 bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4.5v15m7.5-7.5h-15"/></svg>
          Add document
        </button>
      </div>

      <!-- Document list -->
      <div id="doc-list" class="space-y-2">
        <p class="text-neutral-500 text-sm">Select a category from the sidebar.</p>
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="hidden text-center py-16">
        <svg class="w-12 h-12 text-neutral-700 mx-auto mb-4" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
        <p class="text-neutral-500 text-sm">No documents in this category yet.</p>
        <p class="text-neutral-600 text-xs mt-1">Click "Add document" to upload one.</p>
      </div>
    </main>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div id="modal-overlay" class="fixed inset-0 z-50 hidden bg-black/60 flex items-center justify-center px-6" onclick="if(event.target===this)closeModal()">
  <div class="bg-neutral-900 border border-white/10 rounded-xl w-full max-w-md p-6">
    <div class="flex items-center justify-between mb-6">
      <h3 id="modal-title" class="text-lg font-bold">Add document</h3>
      <button onclick="closeModal()" class="text-neutral-500 hover:text-white transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <form onsubmit="saveDoc(event)" class="space-y-4">
      <input type="hidden" id="edit-id" value=""/>
      <div>
        <label class="block text-xs text-neutral-400 mb-1.5">Document name</label>
        <input id="doc-name" type="text" required placeholder="e.g. Üzletszabályzat" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm placeholder-neutral-500 focus:outline-none focus:border-emerald-500 transition-colors"/>
      </div>
      <div>
        <label class="block text-xs text-neutral-400 mb-1.5">PDF — upload or paste URL</label>
        <div class="flex gap-2">
          <input id="doc-url" type="text" placeholder="https://firebasestorage..." class="flex-1 bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm placeholder-neutral-500 focus:outline-none focus:border-emerald-500 transition-colors"/>
          <label class="flex items-center gap-1.5 bg-white/5 border border-white/10 rounded-lg px-3 text-sm text-neutral-400 hover:text-white hover:border-white/20 transition-colors cursor-pointer shrink-0">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
            Upload
            <input type="file" accept=".pdf" class="hidden" onchange="uploadFile(this)"/>
          </label>
        </div>
        <p id="upload-status" class="text-xs text-neutral-500 mt-1.5 hidden"></p>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-3 rounded-lg transition-colors text-sm">Save</button>
        <button type="button" onclick="closeModal()" class="px-6 py-3 rounded-lg border border-white/10 text-sm text-neutral-400 hover:text-white transition-colors">Cancel</button>
      </div>
    </form>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div id="delete-overlay" class="fixed inset-0 z-50 hidden bg-black/60 flex items-center justify-center px-6" onclick="if(event.target===this)closeDelete()">
  <div class="bg-neutral-900 border border-white/10 rounded-xl w-full max-w-sm p-6 text-center">
    <svg class="w-10 h-10 text-red-400 mx-auto mb-3" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
    <p class="font-semibold mb-1">Delete document?</p>
    <p id="delete-name" class="text-sm text-neutral-400 mb-5"></p>
    <div class="flex gap-3">
      <button onclick="confirmDelete()" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">Delete</button>
      <button onclick="closeDelete()" class="flex-1 py-2.5 rounded-lg border border-white/10 text-sm text-neutral-400 hover:text-white transition-colors">Cancel</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// FIREBASE CONFIG — Replace 'YOUR_API_KEY' with your real key
// Firebase Console → Project Settings → General → Web API Key
// ============================================================
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "marketprog-bf7d3.firebaseapp.com",
  projectId: "marketprog-bf7d3",
  storageBucket: "marketprog-bf7d3.appspot.com",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

const CATEGORIES = {
  'asset-manager': 'Az Alapkezelő dokumentumai',
  'regulatory': 'Szabályozói kiadványok',
  'customer-info': 'Ügyfél-tájékoztatás',
  'fatca': 'FATCA',
  'crs': 'CRS'
};

let currentCat = null;
let deleteDocId = null;

// AUTH
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('admin-dashboard').classList.remove('hidden');
    document.getElementById('admin-email').textContent = user.email;
  } else {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('admin-dashboard').classList.add('hidden');
  }
});

function doLogin(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  err.classList.add('hidden');
  auth.signInWithEmailAndPassword(email, pass).catch(error => {
    err.textContent = error.message;
    err.classList.remove('hidden');
  });
}

function doLogout() {
  auth.signOut();
}

// CATEGORY SELECTION
function selectCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('bg-white/10', b.dataset.cat === cat);
    b.classList.toggle('text-white', b.dataset.cat === cat);
    b.classList.toggle('text-neutral-400', b.dataset.cat !== cat);
  });
  document.getElementById('cat-title').textContent = CATEGORIES[cat];
  document.getElementById('add-btn').classList.remove('hidden');
  document.getElementById('add-btn').classList.add('inline-flex');
  loadDocs();
}

// LOAD DOCUMENTS
function loadDocs() {
  const list = document.getElementById('doc-list');
  const empty = document.getElementById('empty-state');
  list.innerHTML = '<p class="text-neutral-500 text-sm">Loading...</p>';
  empty.classList.add('hidden');

  db.collection('documents')
    .where('category', '==', currentCat)
    .orderBy('order', 'asc')
    .get()
    .then(snap => {
      if (snap.empty) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      list.innerHTML = '';
      snap.forEach((doc, idx) => {
        const d = doc.data();
        const el = document.createElement('div');
        el.className = 'flex items-center justify-between bg-white/5 border border-white/5 rounded-lg px-4 py-3.5 group hover:border-white/10 transition-colors';
        el.innerHTML = `
          <div class="flex items-center gap-3 min-w-0">
            <svg class="w-4 h-4 text-neutral-500 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
            <span class="text-sm truncate">${d.name}</span>
          </div>
          <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
            <a href="${d.url}" target="_blank" class="p-1.5 rounded hover:bg-white/10 text-neutral-400 hover:text-emerald-400 transition-colors" title="Open PDF">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
            </a>
            <button onclick="openEditModal('${doc.id}','${d.name.replace(/'/g,"\\'")}','${d.url.replace(/'/g,"\\'")}')" class="p-1.5 rounded hover:bg-white/10 text-neutral-400 hover:text-white transition-colors" title="Edit">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487z"/></svg>
            </button>
            <button onclick="openDelete('${doc.id}','${d.name.replace(/'/g,"\\'")}')" class="p-1.5 rounded hover:bg-white/10 text-neutral-400 hover:text-red-400 transition-colors" title="Delete">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>
            </button>
          </div>
        `;
        list.appendChild(el);
      });
    })
    .catch(err => {
      list.innerHTML = '<p class="text-red-400 text-sm">Error loading documents: ' + err.message + '</p>';
    });
}

// ADD / EDIT MODAL
function openAddModal() {
  document.getElementById('modal-title').textContent = 'Add document';
  document.getElementById('edit-id').value = '';
  document.getElementById('doc-name').value = '';
  document.getElementById('doc-url').value = '';
  document.getElementById('upload-status').classList.add('hidden');
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function openEditModal(id, name, url) {
  document.getElementById('modal-title').textContent = 'Edit document';
  document.getElementById('edit-id').value = id;
  document.getElementById('doc-name').value = name;
  document.getElementById('doc-url').value = url;
  document.getElementById('upload-status').classList.add('hidden');
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
}

// SAVE (CREATE OR UPDATE)
function saveDoc(e) {
  e.preventDefault();
  const id = document.getElementById('edit-id').value;
  const name = document.getElementById('doc-name').value.trim();
  const url = document.getElementById('doc-url').value.trim();
  if (!name || !url) return;

  const data = {
    name: name,
    url: url,
    category: currentCat,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  let promise;
  if (id) {
    promise = db.collection('documents').doc(id).update(data);
  } else {
    data.order = Date.now();
    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    promise = db.collection('documents').add(data);
  }

  promise.then(() => {
    closeModal();
    loadDocs();
  }).catch(err => {
    alert('Error: ' + err.message);
  });
}

// UPLOAD FILE TO STORAGE
function uploadFile(input) {
  const file = input.files[0];
  if (!file) return;
  const status = document.getElementById('upload-status');
  status.classList.remove('hidden');
  status.textContent = 'Uploading...';
  status.className = 'text-xs text-emerald-400 mt-1.5';

  const path = currentCat + '/' + Date.now() + '_' + file.name;
  const ref = storage.ref(path);
  const task = ref.put(file);

  task.on('state_changed',
    snap => {
      const pct = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
      status.textContent = 'Uploading... ' + pct + '%';
    },
    err => {
      status.textContent = 'Upload failed: ' + err.message;
      status.className = 'text-xs text-red-400 mt-1.5';
    },
    () => {
      task.snapshot.ref.getDownloadURL().then(url => {
        document.getElementById('doc-url').value = url;
        status.textContent = 'Uploaded successfully!';
        setTimeout(() => status.classList.add('hidden'), 2000);
      });
    }
  );
  input.value = '';
}

// DELETE
function openDelete(id, name) {
  deleteDocId = id;
  document.getElementById('delete-name').textContent = name;
  document.getElementById('delete-overlay').classList.remove('hidden');
}

function closeDelete() {
  document.getElementById('delete-overlay').classList.add('hidden');
  deleteDocId = null;
}

function confirmDelete() {
  if (!deleteDocId) return;
  db.collection('documents').doc(deleteDocId).delete().then(() => {
    closeDelete();
    loadDocs();
  }).catch(err => {
    alert('Error: ' + err.message);
  });
}
</script>
</body>
</html>
